name: tenniscourtcare
description: "Court Care - Application de suivi de maintenance des courts de tennis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localization
  intl: ^0.20.2

  # HTTP
  http: ^1.3.0

  # DATABASE (Drift + SQLite)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.5
  path: ^1.9.0

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  google_fonts: ^8.0.2
  table_calendar: ^3.1.3
  share_plus: ^12.0.1
  image_picker: ^1.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^17.1.0

  # Security
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.7
  cryptography: ^2.9.0
  dart_jsonwebtoken: ^2.14.3

  # Storage
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  cloud_functions: ^6.0.6

  # Connectivity
  connectivity_plus: ^5.0.0
  rxdart: ^0.28.0
  collection: ^1.19.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.5.4
  drift_dev: ^2.18.0
  riverpod_generator: ^2.6.5
  mockito: ^5.4.4

  # Testing
  integration_test:
    sdk: flutter

  sqlite3: any
  mocktail: ^1.0.4

flutter:
  uses-material-design: true